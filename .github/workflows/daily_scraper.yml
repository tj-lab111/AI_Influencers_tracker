name: Twitter AI Influencers Tracker

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium                    
      
      - name: Run Twitter scraper
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          # 主模型：qwen3.6-plus（PolarDB AI Gateway）
          OPENAI_API_KEY: ${{ secrets.POLARDB_AI_KEY }}
          OPENAI_BASE_URL: http://pg-uf66xw7c1r4xx52sl-pub.polardbaigateway.rds.aliyuncs.com:8000/dev/v1
          AI_MODEL: qwen3.6-plus
          # 备用模型：glm-4-flash（智谱，免费无限）
          BACKUP_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BACKUP_BASE_URL: https://open.bigmodel.cn/api/paas/v4/
          BACKUP_MODEL: glm-4-flash
        run: python twitter_scraper.py
      
      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: reports/
          retention-days: 30
      
      - name: Commit reports to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/*.json reports/*.md 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Add daily report $(date '+%Y-%m-%d')"
          git push    
